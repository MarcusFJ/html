<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>24/7 Pantautomater - Retro vs Clean Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           GLOBALE VARIABLER (DARK MODE STANDARD)
        ========================================= */
        :root {
            /* RETRO TEMA (Mørkt, industrielt) */
            --retro-bg-container: #18181a;
            --retro-bg-header: #0d0d0f;
            --retro-bg-panel: #111;
            --retro-bg-inventory: #0d0d0f;
            --retro-border: #222;
            --retro-border-outer: #2a2a2e;
            --retro-vfd-bg: #050d0a;
            --retro-vfd-border: #1a1a1a;
            --retro-vfd-text: #40ffd0; 
            --retro-vfd-glow1: #40ffd0;
            --retro-vfd-glow2: rgba(64, 255, 208, 0.4);
            --retro-text-muted: #888;
            --retro-btn-bg: #222;
            --retro-btn-border: #444;
            --retro-btn-text: #ccc;

            /* MODERN CLEAN TEMA (Mørk, men minimalistisk) */
            --mod-bg-container: #27272a; 
            --mod-bg-header: #18181b;
            --mod-bg-panel: #27272a;
            --mod-bg-inventory: #18181b;
            --mod-border: #3f3f46;
            --mod-screen-bg: #18181b;
            --mod-screen-text: #f4f4f5; 
            --mod-text-muted: #a1a1aa;
            --mod-btn-bg: #18181b;
            --mod-btn-border: #52525b;
            --mod-accent-green: #22c55e;
            --mod-accent-blue: #3b82f6;
        }

        /* --- Light Mode Tema --- */
        body.light-mode {
            /* RETRO TEMA */
            --retro-bg-container: #e6e6e9;
            --retro-bg-header: #d1d1d6;
            --retro-bg-panel: #f4f4f5;
            --retro-bg-inventory: #e6e6e9;
            --retro-border: #b0b0b8;
            --retro-border-outer: #9999a1;
            --retro-vfd-bg: #b5c4b1;
            --retro-vfd-border: #8b9987;
            --retro-vfd-text: #1a2b16; 
            --retro-vfd-glow1: transparent;
            --retro-vfd-glow2: rgba(0,0,0,0.1);
            --retro-text-muted: #555;
            --retro-btn-bg: #fff;
            --retro-btn-border: #ccc;
            --retro-btn-text: #333;

            /* MODERN CLEAN TEMA (Meget lyse, rene farver) */
            --mod-bg-container: #ffffff;
            --mod-bg-header: #f8fafc;
            --mod-bg-panel: #ffffff;
            --mod-bg-inventory: #f1f5f9;
            --mod-border: #e2e8f0;
            --mod-screen-bg: #f8fafc;
            --mod-screen-text: #0f172a; 
            --mod-text-muted: #64748b;
            --mod-btn-bg: #ffffff;
            --mod-btn-border: #cbd5e1;
            --mod-accent-green: #10b981;
            --mod-accent-blue: #2563eb;
        }

        /* =========================================
           BASE STYLING & LAYOUT
        ========================================= */
        body {
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: transparent; 
            user-select: none;
        }

        .app-wrapper {
            display: flex;
            gap: 40px; 
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Fælles (Logo, Flag, Items) */
        .logo-placeholder { height: 40px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); pointer-events: none; }
        .flags-container { display: flex; gap: 8px; }
        .flag-btn {
            width: 32px; height: 24px; cursor: pointer; border: 2px solid #333; border-radius: 2px;
            transition: 0.2s; opacity: 0.4; filter: grayscale(80%);
        }
        .flag-btn:hover { opacity: 0.8; transform: scale(1.05); }
        .flag-btn.active { opacity: 1; filter: grayscale(0%); border-color: #ff3333; box-shadow: 0 0 8px rgba(255, 51, 51, 0.5); }

        .pant-item { cursor: grab; transition: transform 0.1s; position: relative; }
        .pant-item:active { cursor: grabbing; transform: scale(0.9); }
        .item-can { width: 24px; height: 40px; background: linear-gradient(to right, #6b6b6b, #9e9e9e, #6b6b6b); border-radius: 4px; border-top: 4px solid #b3b3b3; border-bottom: 2px solid #b3b3b3; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .item-small { width: 20px; height: 50px; background: linear-gradient(to right, #404f40, #5c735c, #404f40); border-radius: 4px 4px 2px 2px; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-top: 10px; }
        .item-small::before { content: ""; position: absolute; top: -10px; left: 5px; width: 10px; height: 10px; background: inherit; }
        .item-large { width: 28px; height: 65px; background: linear-gradient(to right, #3b4252, #4c566a, #3b4252); border-radius: 6px 6px 2px 2px; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-top: 15px; }
        .item-large::before { content: ""; position: absolute; top: -15px; left: 8px; width: 12px; height: 15px; background: inherit; }

        @keyframes suckIn {
            0% { transform: translate(-50%, -50%) scale(1) translateY(-20px) rotate(0deg); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(0.9) translateY(-10px) rotate(90deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0) translateY(40px) rotate(90deg); opacity: 0; }
        }
        .falling-anim { animation: suckIn 0.35s ease-in forwards; pointer-events: none; z-index: 100; }

        /* =========================================
           MASKINE 1: RETRO DESIGN (Originalen)
        ========================================= */
        .retro-machine {
            font-family: 'DotGothic16', monospace;
            background: var(--retro-bg-container);
            width: 550px;
            border-radius: 6px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.05);
            border: 4px solid var(--retro-border-outer);
            overflow: hidden;
            transition: all 0.3s;
        }

        .retro-machine .header { background: var(--retro-bg-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--retro-border); transition: all 0.3s; }
        .retro-machine .theme-toggle { background: var(--retro-btn-bg); border: 2px solid var(--retro-btn-border); color: var(--retro-btn-text); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 14px; transition: 0.2s; }
        .retro-machine .theme-toggle:hover { border-color: #ff3333; }
        .retro-machine .main-section { display: flex; border-bottom: 3px solid var(--retro-border); background: var(--retro-bg-panel); transition: all 0.3s; }
        .retro-machine .left-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 3px solid var(--retro-border); }
        .retro-machine .vfd-display { background-color: var(--retro-vfd-bg); border: 4px inset var(--retro-vfd-border); padding: 15px; height: 60px; display: flex; flex-direction: column; justify-content: center; transition: all 0.3s; }
        .retro-machine .vfd-text { color: var(--retro-vfd-text); text-shadow: 0 0 4px var(--retro-vfd-glow1), 0 0 8px var(--retro-vfd-glow2); font-size: 20px; margin: 0; line-height: 1.2; text-transform: uppercase; transition: all 0.3s; }
        .retro-machine .action-buttons { display: flex; gap: 10px; margin-top: auto; }
        .retro-machine .btn-action { flex: 1; padding: 12px 5px; border: 2px solid transparent; border-radius: 4px; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.1s; color: #fff; text-transform: uppercase; }
        .retro-machine .btn-payout { background-color: #1b5e20; border-color: #2e7d32; box-shadow: 0 4px 0 #003300; }
        .retro-machine .btn-payout:active { transform: translateY(4px); box-shadow: 0 0 0 #003300; }
        .retro-machine .btn-donate { background-color: #01579b; border-color: #0277bd; box-shadow: 0 4px 0 #002f6c; }
        .retro-machine .btn-donate:active { transform: translateY(4px); box-shadow: 0 0 0 #002f6c; }
        .retro-machine .right-panel { width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .retro-machine .hole-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .retro-machine .hole { width: 90px; height: 90px; background: #000; border-radius: 50%; box-shadow: inset 0 20px 30px rgba(0,0,0,1), 0 2px 0 rgba(255,255,255,0.1); border: 6px solid #2a2a2a; transition: 0.2s; }
        .retro-machine .hole.drag-over { background: #2a1111; border-color: #ff3333; box-shadow: inset 0 0 25px rgba(255, 51, 51, 0.4), 0 0 15px rgba(255, 51, 51, 0.2); transform: scale(1.05); }
        .retro-machine .hole.active { background: #ff3333; transition: 0.05s; }
        .retro-machine .receipt-area { position: absolute; top: calc(100% - 32px); left: 50%; transform: translateX(-50%); width: 100px; height: 90px; display: flex; justify-content: center; pointer-events: none; overflow: hidden; z-index: 30; }
        .retro-machine .receipt-slit { position: absolute; top: 0; width: 80px; height: 6px; background: #000; border-radius: 3px; border-bottom: 1px solid #333; z-index: 5; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        .retro-machine .receipt-paper { position: absolute; top: 0; width: 60px; height: 70px; background: #fdfdfd; border-left: 1px dashed #ccc; border-right: 1px dashed #ccc; border-bottom: 2px solid #ddd; z-index: 2; transform: translateY(-100%); transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1); background-image: repeating-linear-gradient(transparent, transparent 4px, #aaa 4px, #aaa 6px); background-size: 80% 12px; background-repeat: no-repeat; background-position: center 10px; }
        .retro-machine .receipt-paper.print { transform: translateY(5px); }
        .retro-machine .inventory-section { padding: 15px 20px; background: var(--retro-bg-inventory); transition: all 0.3s; position: relative; z-index: 20; }
        .retro-machine .inventory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: var(--retro-text-muted); font-size: 14px; }
        .retro-machine .item-area { display: flex; flex-wrap: wrap; gap: 15px; height: 110px; align-content: flex-start; padding: 10px; background: var(--retro-bg-panel); border: 2px dashed var(--retro-border); border-radius: 4px; overflow-y: auto; transition: all 0.3s; }
        .retro-machine .item-area::-webkit-scrollbar { width: 10px; }
        .retro-machine .item-area::-webkit-scrollbar-track { background: var(--retro-bg-inventory); border-radius: 0 4px 4px 0; border-left: 1px solid var(--retro-border); }
        .retro-machine .item-area::-webkit-scrollbar-thumb { background: var(--retro-border); border-radius: 4px; }
        .retro-machine .item-area::-webkit-scrollbar-thumb:hover { background: #ff3333; }
        .retro-machine .btn-spawn { background: var(--retro-btn-bg); color: var(--retro-text-muted); border: 1px solid var(--retro-btn-border); padding: 2px 8px; cursor: pointer; font-family: inherit; }
        .retro-machine .btn-spawn:hover { color: #ff3333; border-color: #ff3333; }

        /* =========================================
           MASKINE 2: MODERN CLEAN DESIGN
        ========================================= */
        .modern-machine {
            font-family: 'Roboto', sans-serif; 
            background: var(--mod-bg-container);
            width: 550px;
            border-radius: 8px; /* Rene, let afrundede kanter */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Blødere skygge */
            border: 1px solid var(--mod-border); /* Tynd, clean border */
            overflow: hidden;
            transition: all 0.3s;
        }

        .modern-machine .header { background: var(--mod-bg-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--mod-border); transition: all 0.3s; }
        
        .modern-machine .theme-toggle { 
            background: var(--mod-bg-container); 
            border: 1px solid var(--mod-btn-border); 
            color: var(--mod-text-muted); 
            padding: 6px 12px; 
            border-radius: 4px; /* Clean firkantet format */
            cursor: pointer; 
            font-weight: 500; 
            font-size: 13px; 
            transition: 0.2s; 
        }
        .modern-machine .theme-toggle:hover { color: var(--mod-screen-text); border-color: var(--mod-screen-text); }
        
        .modern-machine .main-section { display: flex; border-bottom: 1px solid var(--mod-border); background: var(--mod-bg-panel); transition: all 0.3s; }
        .modern-machine .left-panel { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--mod-border); }
        
        /* Clean Display uden glow */
        .modern-machine .clean-display { 
            background-color: var(--mod-screen-bg); 
            border: 1px solid var(--mod-border);
            border-radius: 6px; 
            padding: 20px; 
            height: 60px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            transition: all 0.3s; 
        }
        .modern-machine .clean-text { 
            color: var(--mod-screen-text); 
            font-size: 20px; 
            font-weight: 500;
            margin: 0; 
            line-height: 1.4; 
            letter-spacing: 0.5px;
            transition: all 0.3s; 
        }

        .modern-machine .action-buttons { display: flex; gap: 12px; margin-top: auto; }
        .modern-machine .btn-action { 
            flex: 1; padding: 14px 5px; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; 
            cursor: pointer; transition: 0.2s; color: #fff; letter-spacing: 0.5px;
        }
        .modern-machine .btn-payout { background-color: var(--mod-accent-green); } 
        .modern-machine .btn-payout:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .modern-machine .btn-payout:active { transform: translateY(1px); }
        .modern-machine .btn-donate { background-color: var(--mod-accent-blue); } 
        .modern-machine .btn-donate:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .modern-machine .btn-donate:active { transform: translateY(1px); }

        .modern-machine .right-panel { width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        
        /* Minimalistisk Scanner/Hul */
        .modern-machine .hole-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .modern-machine .hole { 
            width: 90px; height: 90px; background: #000; border-radius: 50%; 
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.6); /* Blød dybde, ikke overdrevet */
            border: 2px solid var(--mod-border); 
            transition: 0.2s ease-in-out; 
        }
        .modern-machine .hole.drag-over { 
            border-color: var(--mod-accent-green); /* Clean grøn markeringskant */
            transform: scale(1.02); 
        }
        .modern-machine .hole.active { background: var(--mod-accent-green); transition: 0.05s; } /* Grønt blink */

        /* Clean Bon Printer */
        .modern-machine .receipt-area { position: absolute; top: calc(100% - 32px); left: 50%; transform: translateX(-50%); width: 100px; height: 90px; display: flex; justify-content: center; pointer-events: none; overflow: hidden; z-index: 30; }
        .modern-machine .receipt-slit { position: absolute; top: 0; width: 70px; height: 4px; background: #000; border-radius: 2px; z-index: 5; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8); }
        .modern-machine .receipt-paper { 
            position: absolute; top: 0; width: 56px; height: 70px; background: #ffffff; 
            border: 1px solid #e2e8f0;
            border-top: none;
            z-index: 2; transform: translateY(-100%); transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
            background-image: repeating-linear-gradient(transparent, transparent 6px, #cbd5e1 6px, #cbd5e1 8px); 
            background-size: 80% 16px; background-repeat: no-repeat; background-position: center 12px; 
        }
        .modern-machine .receipt-paper.print { transform: translateY(5px); }

        .modern-machine .inventory-section { padding: 20px; background: var(--mod-bg-inventory); transition: all 0.3s; position: relative; z-index: 20; border-top: 1px solid var(--mod-border);}
        .modern-machine .inventory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--mod-text-muted); font-size: 13px; font-weight: 500; }
        .modern-machine .item-area { display: flex; flex-wrap: wrap; gap: 15px; height: 110px; align-content: flex-start; padding: 15px; background: var(--mod-bg-panel); border: 1px solid var(--mod-border); border-radius: 6px; overflow-y: auto; transition: all 0.3s; }
        .modern-machine .item-area::-webkit-scrollbar { width: 6px; }
        .modern-machine .item-area::-webkit-scrollbar-track { background: transparent; }
        .modern-machine .item-area::-webkit-scrollbar-thumb { background: var(--mod-btn-border); border-radius: 10px; }
        .modern-machine .item-area::-webkit-scrollbar-thumb:hover { background: var(--mod-text-muted); }
        .modern-machine .btn-spawn { background: transparent; color: var(--mod-text-muted); border: 1px solid var(--mod-btn-border); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: 0.2s;}
        .modern-machine .btn-spawn:hover { color: var(--mod-screen-text); border-color: var(--mod-screen-text); background: var(--mod-bg-panel); }

    </style>
</head>
<body>

    <div class="app-wrapper">

        <div class="machine-container retro-machine">
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/24-7_Logo.svg/512px-24-7_Logo.svg.png" class="logo-placeholder" alt="24/7 Logo" draggable="false">
                <div class="header-controls">
                    <button class="theme-toggle" onclick="toggleTheme()">SKIFT TEMA</button>
                    <div class="flags-container">
                        <img src="https://flagcdn.com/w40/dk.png" id="flag-da-retro" class="flag-btn active" onclick="changeLanguage('da')" alt="Dansk" draggable="false">
                        <img src="https://flagcdn.com/w40/gb.png" id="flag-en-retro" class="flag-btn" onclick="changeLanguage('en')" alt="English" draggable="false">
                        <img src="https://flagcdn.com/w40/de.png" id="flag-de-retro" class="flag-btn" onclick="changeLanguage('de')" alt="Deutsch" draggable="false">
                    </div>
                </div>
            </div>

            <div class="main-section">
                <div class="left-panel">
                    <div class="vfd-display">
                        <p class="vfd-text" id="vfd-line1-retro">VELKOMMEN!</p>
                        <p class="vfd-text" id="vfd-line2-retro">I ALT: 0.00 DKK</p>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-payout" id="btn-payout-retro" onclick="finishSession('payout', 'retro')">UDBETAL</button>
                        <button class="btn-action btn-donate" id="btn-donate-retro" onclick="finishSession('donate', 'retro')">DONÉR</button>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="hole-wrapper" id="hole-wrapper-retro">
                        <div class="hole" id="insert-hole-retro" ondrop="dropItem(event, 'retro')" ondragover="allowDrop(event)" ondragenter="dragEnter(event, 'retro')" ondragleave="dragLeave(event, 'retro')"></div>
                        <p id="txt-insert-retro" style="font-size: 14px; color: var(--retro-text-muted); margin-top: 15px; text-transform: uppercase; text-align: center;">TRÆK PANT HER</p>
                    </div>
                    <div class="receipt-area">
                        <div class="receipt-slit"></div>
                        <div class="receipt-paper" id="receipt-paper-retro"></div>
                    </div>
                </div>
            </div>

            <div class="inventory-section">
                <div class="inventory-header">
                    <span id="txt-inventory-retro">DIN TASKE (TRÆK PANT HERFRA)</span>
                    <button class="btn-spawn" onclick="spawnRandomItems(10, 'item-area-retro')">+ FIND MERE</button>
                </div>
                <div class="item-area" id="item-area-retro"></div>
            </div>
        </div>

        <div class="machine-container modern-machine">
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/24-7_Logo.svg/512px-24-7_Logo.svg.png" class="logo-placeholder" alt="24/7 Logo" draggable="false">
                <div class="header-controls">
                    <button class="theme-toggle" onclick="toggleTheme()">Skift Tema</button>
                    <div class="flags-container">
                        <img src="https://flagcdn.com/w40/dk.png" id="flag-da-modern" class="flag-btn active" onclick="changeLanguage('da')" alt="Dansk" draggable="false">
                        <img src="https://flagcdn.com/w40/gb.png" id="flag-en-modern" class="flag-btn" onclick="changeLanguage('en')" alt="English" draggable="false">
                        <img src="https://flagcdn.com/w40/de.png" id="flag-de-modern" class="flag-btn" onclick="changeLanguage('de')" alt="Deutsch" draggable="false">
                    </div>
                </div>
            </div>

            <div class="main-section">
                <div class="left-panel">
                    <div class="clean-display">
                        <p class="clean-text" id="vfd-line1-modern">VELKOMMEN!</p>
                        <p class="clean-text" id="vfd-line2-modern">I ALT: 0.00 DKK</p>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-payout" id="btn-payout-modern" onclick="finishSession('payout', 'modern')">UDBETAL</button>
                        <button class="btn-action btn-donate" id="btn-donate-modern" onclick="finishSession('donate', 'modern')">DONÉR</button>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="hole-wrapper" id="hole-wrapper-modern">
                        <div class="hole" id="insert-hole-modern" ondrop="dropItem(event, 'modern')" ondragover="allowDrop(event)" ondragenter="dragEnter(event, 'modern')" ondragleave="dragLeave(event, 'modern')"></div>
                        <p id="txt-insert-modern" style="font-size: 13px; font-weight: 500; color: var(--mod-text-muted); margin-top: 15px; text-transform: uppercase; text-align: center; letter-spacing: 0.5px;">TRÆK PANT HER</p>
                    </div>
                    <div class="receipt-area">
                        <div class="receipt-slit"></div>
                        <div class="receipt-paper" id="receipt-paper-modern"></div>
                    </div>
                </div>
            </div>

            <div class="inventory-section">
                <div class="inventory-header">
                    <span id="txt-inventory-modern">DIN TASKE</span>
                    <button class="btn-spawn" onclick="spawnRandomItems(10, 'item-area-modern')">+ FIND MERE</button>
                </div>
                <div class="item-area" id="item-area-modern"></div>
            </div>
        </div>

    </div>

    <script>
        // Data og States for begge maskiner
        let state = {
            retro: { totalAmount: 0.00, isActive: true },
            modern: { totalAmount: 0.00, isActive: true }
        };
        
        let currentLang = 'da';
        let itemCounter = 0; 

        const prices = { 'can': 1.00, 'small': 1.50, 'large': 3.00 };

        const translations = {
            da: { welcome: "VELKOMMEN!", total: "I ALT", insert: "TRÆK PANT HER", inventory: "DIN TASKE (TRÆK PANT HERFRA)", inventoryMod: "DIN TASKE", can: "DÅSE", small: "LILLE FLASKE", large: "STOR FLASKE", payout: "UDBETAL", donate: "DONÉR", inserted: "INDSAT", currency: "DKK", thanks: "TAK FOR PANTE!", donated: "PENGE DONERET!" },
            en: { welcome: "WELCOME!", total: "TOTAL", insert: "DRAG BOTTLES HERE", inventory: "YOUR BAG (DRAG FROM HERE)", inventoryMod: "YOUR BAG", can: "CAN", small: "SMALL BOTTLE", large: "LARGE BOTTLE", payout: "PAYOUT", donate: "DONATE", inserted: "INSERTED", currency: "$", thanks: "THANKS FOR RECYCLING!", donated: "MONEY DONATED!" },
            de: { welcome: "WILLKOMMEN!", total: "GESAMT", insert: "FLASCHEN HIER ZIEHEN", inventory: "DEINE TASCHE (ZIEHEN)", inventoryMod: "DEINE TASCHE", can: "DOSE", small: "KLEINE FLASCHE", large: "GROßE FLASCHE", payout: "AUSZAHLEN", donate: "SPENDEN", inserted: "EINGEWORFEN", currency: "€", thanks: "DANKE FÜRS PFAND!", donated: "GELD GESPENDET!" }
        };

        window.onload = function() {
            // Spawner start-pant i begge maskiner
            spawnRandomItems(10, 'item-area-retro');
            spawnRandomItems(10, 'item-area-modern');
        };

        function spawnRandomItems(amount, targetId) {
            const area = document.getElementById(targetId);
            const types = [
                { type: 'can', price: prices.can, class: 'item-can' },
                { type: 'small', price: prices.small, class: 'item-small' },
                { type: 'large', price: prices.large, class: 'item-large' }
            ];

            for(let i=0; i<amount; i++) {
                itemCounter++;
                const randomItem = types[Math.floor(Math.random() * types.length)];
                const div = document.createElement("div");
                div.id = `pant-${itemCounter}`;
                div.className = `pant-item ${randomItem.class}`;
                div.draggable = true;
                div.dataset.type = randomItem.type;
                div.dataset.price = randomItem.price;
                div.addEventListener('dragstart', dragStart);
                area.appendChild(div);
            }
        }

        // --- Drag & Drop ---
        function allowDrop(ev) { ev.preventDefault(); }
        
        function dragEnter(ev, machine) { 
            if(!state[machine].isActive) return;
            ev.preventDefault(); 
            document.getElementById(`insert-hole-${machine}`).classList.add('drag-over'); 
        }
        
        function dragLeave(ev, machine) { 
            document.getElementById(`insert-hole-${machine}`).classList.remove('drag-over'); 
        }
        
        function dragStart(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
            ev.dataTransfer.setData("type", ev.target.dataset.type);
            ev.dataTransfer.setData("price", ev.target.dataset.price);
        }

        function dropItem(ev, machine) {
            ev.preventDefault();
            if(!state[machine].isActive) return;

            const hole = document.getElementById(`insert-hole-${machine}`);
            hole.classList.remove('drag-over');

            const id = ev.dataTransfer.getData("id");
            const type = ev.dataTransfer.getData("type");
            const price = parseFloat(ev.dataTransfer.getData("price"));

            if(id && type && !isNaN(price)) {
                hole.classList.add('active');
                setTimeout(() => hole.classList.remove('active'), 100);

                const draggedElement = document.getElementById(id);
                if(draggedElement) {
                    const wrapper = document.getElementById(`hole-wrapper-${machine}`);
                    const clone = draggedElement.cloneNode(true);
                    
                    clone.removeAttribute('id');
                    clone.style.position = 'absolute';
                    clone.style.top = '35px';
                    clone.style.left = '50%';
                    clone.style.margin = '0';
                    clone.classList.add('falling-anim'); 
                    
                    wrapper.appendChild(clone);
                    setTimeout(() => clone.remove(), 350);
                    draggedElement.remove();
                }
                processPawn(type, price, machine);
            }
        }

        // --- Logik og Display ---
        function processPawn(type, price, machine) {
            const t = translations[currentLang];
            state[machine].totalAmount += price;
            updateDisplay(`${t.inserted}: ${t[type]}`, machine);
        }

        function updateDisplay(line1Text, machine) {
            const t = translations[currentLang];
            document.getElementById(`vfd-line1-${machine}`).innerText = line1Text;
            document.getElementById(`vfd-line2-${machine}`).innerText = `${t.total}: ${state[machine].totalAmount.toFixed(2)} ${t.currency}`;
        }

        // --- Globale Funktioner ---
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            const t = translations[currentLang];
            
            // Opdater visuelt flag på begge maskiner
            document.querySelectorAll('.flag-btn').forEach(flag => flag.classList.remove('active'));
            document.getElementById(`flag-${langCode}-retro`).classList.add('active');
            document.getElementById(`flag-${langCode}-modern`).classList.add('active');
            
            // Opdater tekst på RETRO
            document.getElementById("txt-insert-retro").innerText = t.insert;
            document.getElementById("txt-inventory-retro").innerText = t.inventory;
            document.getElementById("btn-payout-retro").innerText = t.payout;
            document.getElementById("btn-donate-retro").innerText = t.donate;
            updateDisplay(t.welcome, 'retro');

            // Opdater tekst på MODERN
            document.getElementById("txt-insert-modern").innerText = t.insert;
            document.getElementById("txt-inventory-modern").innerText = t.inventoryMod; 
            document.getElementById("btn-payout-modern").innerText = t.payout;
            document.getElementById("btn-donate-modern").innerText = t.donate;
            updateDisplay(t.welcome, 'modern');
        }

        // --- Afslut Session (Individuel for hver maskine) ---
        function finishSession(action, machine) {
            const t = translations[currentLang];
            if (state[machine].totalAmount === 0 || !state[machine].isActive) return;

            state[machine].isActive = false; 

            if (action === 'payout') {
                updateDisplay(t.thanks, machine);
                document.getElementById(`receipt-paper-${machine}`).classList.add('print');
            } else if (action === 'donate') {
                updateDisplay(t.donated, machine);
            }

            setTimeout(() => {
                state[machine].totalAmount = 0.00;
                updateDisplay(t.welcome, machine);
                document.getElementById(`receipt-paper-${machine}`).classList.remove('print');
                
                state[machine].isActive = true; 
            }, 3000);
        }
    </script>
</body>
</html>
